<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#4a90d9"/>
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <defs>
