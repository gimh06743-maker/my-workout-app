  <rect x="96" y="216" width="32" height="80" rx="16" fill="white"/>
  <!-- Right weight -->
  <rect x="356" y="196" width="36" height="120" rx="18" fill="white" opacity="0.95"/>
  <rect x="384" y="216" width="32" height="80" rx="16" fill="white"/>
